<!-- Portfolio Grid Section -->
<section id="algorithm" class="bg-light-gray">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading">Algorithm</h2>
                <h3 class="section-subheading text-muted">All research tools for Thermal Infrared Camera.</h3>
            </div>
        </div>
        <div class="row">
        {% assign sorted_algorithm = site.posts | where: "type", "algorithm" | sort: 'modal-id' %}
        {% for post in sorted_algorithm %}
            <div class="col-md-4 col-sm-6 portfolio-item">
                <a href="#portfolioModal{{ post.modal-id }}" class="portfolio-link" data-toggle="modal">
                    <div class="portfolio-hover">
                        <div class="portfolio-hover-content">
                            <i class="fa fa-plus fa-3x"></i>
                        </div>
                    </div>
                    <img src="img/portfolio/{{ post.thumbnail }}" class="img-responsive img-centered" alt="">
                </a>
                <div class="portfolio-caption">
                    <h4>{{ post.title }}</h4>
                    <p class="text-muted">{{ post.subtitle }}</p>
                </div>
            </div>
        {% endfor %}
        </div>
    </div>
</section>
