version: "3.8"

services:
  jekyll:
    image: jekyll/jekyll:pages
    command: >
      sh -c "bundle install &&
             bundle exec jekyll serve --watch --host 0.0.0.0"
    ports:
      - "4000:4000"
    volumes:
      - .:/srv/jekyll
    environment:
      JEKYLL_ENV: development
    user: "${UID}:${GID}"  # 현재 로컬 사용자 권한을 Docker에 적용